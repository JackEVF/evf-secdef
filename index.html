<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EVF Feed Test 2</title>
<style>
body { font-family: monospace; padding: 24px; background: #f5f5f5; }
h2 { margin-bottom: 16px; }
.row { padding: 8px 12px; margin-bottom: 4px; border-radius: 4px; background: white; font-size: 13px; }
.ok { border-left: 3px solid #4CAF50; }
.fail { border-left: 3px solid #E53935; }
.pending { border-left: 3px solid #ccc; color: #999; }
strong { display: inline-block; width: 320px; }
</style>
</head>
<body>
<h2>EVF Feed Test 2 — results appear as each completes</h2>
<div id="out"></div>
<script>
const out = document.getElementById('out');

function row(id, name, method) {
  const d = document.createElement('div');
  d.className = 'row pending';
  d.id = 'r' + id;
  d.innerHTML = `<strong>${name}</strong> <span>[${method}]</span> <span class="res">testing...</span>`;
  out.appendChild(d);
}

function update(id, ok, ms, extra) {
  const el = document.getElementById('r' + id);
  el.className = 'row ' + (ok ? 'ok' : 'fail');
  el.querySelector('.res').textContent = (ok ? '✓ OK' : '✗ FAIL') + ` — ${ms}ms` + (extra ? ' — ' + extra : '');
}

const TESTS = [
  // rss2json WITHOUT count param (free tier)
  { id: 1, name: 'rss2json no-count: SpaceNews', method: 'rss2json-free', url: 'https://spacenews.com/feed/' },
  { id: 2, name: 'rss2json no-count: Breaking Defense', method: 'rss2json-free', url: 'https://breakingdefense.com/feed/' },
  { id: 3, name: 'rss2json no-count: Euractiv Defence', method: 'rss2json-free', url: 'https://www.euractiv.com/sections/defence-and-security/feed/' },
  { id: 4, name: 'rss2json no-count: TED defence', method: 'rss2json-free', url: 'https://ted.europa.eu/en/simap/rss-feed/-/rss/search/defe' },
  { id: 5, name: 'rss2json no-count: EO Mag', method: 'rss2json-free', url: 'https://eomag.eu/feed/' },
  // corsproxy.io
  { id: 6, name: 'corsproxy.io: SpaceNews', method: 'corsproxy', url: 'https://spacenews.com/feed/' },
  { id: 7, name: 'corsproxy.io: Breaking Defense', method: 'corsproxy', url: 'https://breakingdefense.com/feed/' },
  { id: 8, name: 'corsproxy.io: Euractiv Defence', method: 'corsproxy', url: 'https://www.euractiv.com/sections/defence-and-security/feed/' },
  { id: 9, name: 'corsproxy.io: TED defence', method: 'corsproxy', url: 'https://ted.europa.eu/en/simap/rss-feed/-/rss/search/defe' },
  // cors.sh (free, no key needed)
  { id: 10, name: 'cors.sh: SpaceNews', method: 'corssh', url: 'https://spacenews.com/feed/' },
  { id: 11, name: 'cors.sh: Breaking Defense', method: 'corssh', url: 'https://breakingdefense.com/feed/' },
  // feedparser via public API
  { id: 12, name: 'feedparser.xyz: SpaceNews', method: 'feedparser', url: 'https://spacenews.com/feed/' },
  { id: 13, name: 'feedparser.xyz: Euractiv Defence', method: 'feedparser', url: 'https://www.euractiv.com/sections/defence-and-security/feed/' },
];

TESTS.forEach(t => row(t.id, t.name, t.method));

async function runTest(t) {
  const t0 = Date.now();
  try {
    let ok = false, extra = '';

    if (t.method === 'rss2json-free') {
      // No count param — free tier
      const r = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(t.url)}`, { signal: AbortSignal.timeout(6000) });
      const d = await r.json();
      ok = d.status === 'ok' && d.items?.length > 0;
      extra = ok ? `${d.items.length} items — "${(d.items[0]?.title||'').substring(0,40)}"` : (d.message || 'failed');

    } else if (t.method === 'corsproxy') {
      const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(t.url)}`, { signal: AbortSignal.timeout(6000) });
      const text = await r.text();
      ok = text.includes('<item>') || text.includes('<entry>');
      extra = ok ? 'has items' : 'no items';

    } else if (t.method === 'corssh') {
      const r = await fetch(t.url, {
        headers: { 'x-cors-api-key': 'temp_' },
        signal: AbortSignal.timeout(6000)
      });
      const text = await r.text();
      ok = text.includes('<item>') || text.includes('<entry>');
      extra = ok ? 'has items' : 'no items';

    } else if (t.method === 'feedparser') {
      const r = await fetch(`https://api.feedparser.xyz/v1/parse?url=${encodeURIComponent(t.url)}`, { signal: AbortSignal.timeout(6000) });
      const d = await r.json();
      ok = d.items?.length > 0;
      extra = ok ? `${d.items.length} items` : 'failed';
    }

    update(t.id, ok, Date.now() - t0, extra);
  } catch(e) {
    update(t.id, false, Date.now() - t0, e.message.substring(0, 60));
  }
}

Promise.all(TESTS.map(runTest)).then(() => {
  const d = document.createElement('div');
  d.style.cssText = 'margin-top:16px;padding:12px;background:white;border-radius:4px;font-weight:bold;font-size:13px';
  d.textContent = 'All tests complete.';
  out.appendChild(d);
});
</script>
</body>
</html>
