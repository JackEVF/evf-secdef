<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EVF Feed Test</title>
<style>
body { font-family: monospace; padding: 24px; background: #f5f5f5; }
h2 { margin-bottom: 16px; }
.row { padding: 8px 12px; margin-bottom: 4px; border-radius: 4px; background: white; font-size: 13px; }
.ok { border-left: 3px solid #4CAF50; }
.fail { border-left: 3px solid #E53935; }
.pending { border-left: 3px solid #ccc; color: #999; }
strong { display: inline-block; width: 280px; }
</style>
</head>
<body>
<h2>EVF Feed Test — results appear as each test completes</h2>
<div id="out"></div>
<script>
const out = document.getElementById('out');

function row(id, name, method) {
  const d = document.createElement('div');
  d.className = 'row pending';
  d.id = id;
  d.innerHTML = `<strong>${name}</strong> <span class="method">[${method}]</span> <span class="result">testing...</span>`;
  out.appendChild(d);
  return d;
}

function update(el, ok, ms, extra) {
  el.className = 'row ' + (ok ? 'ok' : 'fail');
  el.querySelector('.result').textContent = (ok ? '✓ OK' : '✗ FAIL') + ` — ${ms}ms` + (extra ? ' — ' + extra : '');
}

const TESTS = [
  // Direct fetch
  { id: 'd1', name: 'SpaceNews', method: 'direct', url: 'https://spacenews.com/feed/' },
  { id: 'd2', name: 'Breaking Defense', method: 'direct', url: 'https://breakingdefense.com/feed/' },
  { id: 'd3', name: 'European Spaceflight', method: 'direct', url: 'https://europeanspaceflight.com/feed/' },
  { id: 'd4', name: 'Euractiv Defence', method: 'direct', url: 'https://www.euractiv.com/sections/defence-and-security/feed/' },
  { id: 'd5', name: 'EO Mag', method: 'direct', url: 'https://eomag.eu/feed/' },
  // allorigins proxy
  { id: 'a1', name: 'SpaceNews', method: 'allorigins', url: 'https://spacenews.com/feed/' },
  { id: 'a2', name: 'Breaking Defense', method: 'allorigins', url: 'https://breakingdefense.com/feed/' },
  { id: 'a3', name: 'Euractiv Defence', method: 'allorigins', url: 'https://www.euractiv.com/sections/defence-and-security/feed/' },
  { id: 'a4', name: 'TED defence sector', method: 'allorigins', url: 'https://ted.europa.eu/en/simap/rss-feed/-/rss/search/defe' },
  // rss2json
  { id: 'r1', name: 'SpaceNews', method: 'rss2json', url: 'https://spacenews.com/feed/' },
  { id: 'r2', name: 'Breaking Defense', method: 'rss2json', url: 'https://breakingdefense.com/feed/' },
  { id: 'r3', name: 'Euractiv Defence', method: 'rss2json', url: 'https://www.euractiv.com/sections/defence-and-security/feed/' },
  { id: 'r4', name: 'TED defence sector', method: 'rss2json', url: 'https://ted.europa.eu/en/simap/rss-feed/-/rss/search/defe' },
  { id: 'r5', name: 'TED R&D services', method: 'rss2json', url: 'https://ted.europa.eu/en/simap/rss-feed/-/rss/search/reco' },
];

// Pre-render all rows
TESTS.forEach(t => row(t.id, t.name, t.method));

async function runTest(t) {
  const el = document.getElementById(t.id);
  const t0 = Date.now();
  try {
    let ok = false;
    let extra = '';
    if (t.method === 'direct') {
      const r = await fetch(t.url, { signal: AbortSignal.timeout(5000) });
      const text = await r.text();
      ok = text.includes('<item>') || text.includes('<entry>');
      extra = ok ? 'has items' : 'no items found';
    } else if (t.method === 'allorigins') {
      const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(t.url)}`, { signal: AbortSignal.timeout(6000) });
      const d = await r.json();
      ok = d.contents && (d.contents.includes('<item>') || d.contents.includes('<entry>'));
      extra = ok ? 'has items' : 'empty or error';
    } else if (t.method === 'rss2json') {
      const r = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(t.url)}&count=5`, { signal: AbortSignal.timeout(6000) });
      const d = await r.json();
      ok = d.status === 'ok' && d.items?.length > 0;
      extra = ok ? `${d.items.length} items, first: "${(d.items[0]?.title||'').substring(0,40)}"` : (d.message || 'no items');
    }
    update(el, ok, Date.now() - t0, extra);
  } catch(e) {
    update(el, false, Date.now() - t0, e.message.substring(0, 50));
  }
}

// Run all tests in parallel
Promise.all(TESTS.map(runTest)).then(() => {
  const done = document.createElement('div');
  done.style.cssText = 'margin-top:16px;padding:12px;background:white;border-radius:4px;font-size:13px;font-weight:bold';
  done.textContent = 'All tests complete.';
  out.appendChild(done);
});
</script>
</body>
</html>
